<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BI Gestión de Calidad - Ushuaia Visión</title>
    <style>
        :root { --primary: #0056b3; --accent: #28a745; --danger: #dc3545; --warning: #f59e0b; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin: auto; max-width: 480px; border-top: 6px solid var(--primary); }
        label { display: block; margin-top: 15px; font-weight: bold; font-size: 13px; color: #444; }
        input, select, textarea, button { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; box-sizing: border-box; }
        .btn-send { background: var(--accent); color: white; border: none; font-weight: bold; cursor: pointer; height: 55px; font-size: 16px; margin-top: 20px; }
        .nav-link { text-align: center; margin-top: 20px; font-size: 10px; color: #ccc; cursor: pointer; }
        
        /* Dashboard */
        #view-admin { display: none; max-width: 1100px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .stat-card { background: var(--primary); color: white; padding: 15px; border-radius: 10px; text-align: center; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; background: white; margin-top: 15px; }
        th, td { padding: 10px; border: 1px solid #eee; text-align: left; }
        .row-risk { background: #fff1f1; border-left: 4px solid var(--danger); }
        
        #view-survey, #view-emitter { display: block; }
    </style>
</head>
<body>

<div id="app-container" style="max-width: 1200px; margin: auto;">

    <div id="view-emitter" class="card">
        <h3 style="text-align:center; margin:0">Registro de Atención</h3>
        <p style="text-align:center; font-size:12px; color:#666">Habilitá al cliente y enviá la encuesta por WhatsApp.</p>
        
        <label>Nro. de Cliente (CRM):</label>
        <input type="text" id="em-nro" placeholder="Ej: 18701">
        
        <label>DNI del Cliente:</label>
        <input type="text" id="em-dni" placeholder="Para validar acceso">

        <label>WhatsApp del Cliente (Solo números):</label>
        <input type="text" id="em-phone" placeholder="Ej: 2901448780">

        <label>Asesor:</label>
        <select id="em-asesor">
            <option>MIGUEL GALVAN</option><option>RODRIGO</option><option>CAROLINA</option><option>PAULA</option>
        </select>

        <button onclick="procesarYEnviar()" class="btn-send">🚀 HABILITAR Y ENVIAR</button>
        <p class="nav-link" onclick="accesoAdmin()">⚙️ PANEL INTERNO</p>
    </div>

    <div id="view-survey" class="card" style="display:none">
        <div id="survey-auth">
            <h3 style="text-align:center">Validación</h3>
            <label>Ingresá tu DNI para continuar:</label>
            <input type="text" id="auth-dni" placeholder="Tu número de DNI">
            <button onclick="validarDNI()" class="btn-send" style="background:var(--primary)">ENTRAR</button>
        </div>
        <div id="survey-main" style="display:none">
            <h3 style="color:var(--primary)">Tu opinión importa</h3>
            <label>¿Cómo calificarías nuestra atención? (1-5)</label>
            <select id="q-atencion"><option value="5">Excelente ⭐⭐⭐⭐⭐</option><option value="4">Muy Buena ⭐⭐⭐⭐</option><option value="3">Buena ⭐⭐⭐</option><option value="2">Regular ⭐⭐</option><option value="1">Mala ⭐</option></select>
            
            <label>¿Nos recomendarías? (0 al 10)</label>
            <input type="number" id="q-nps" min="0" max="10" value="10">

            <label>Comentarios adicionales:</label>
            <textarea id="q-comentario" rows="3" oninput="detectarBaja()"></textarea>

            <div id="div-baja" style="display:none; background:#fff3cd; padding:10px; border-radius:8px; margin-top:10px">
                <label>Detectamos una posible baja. ¿A qué empresa pensás cambiarte?</label>
                <select id="q-comp"><option>Ninguna</option><option>STARLINK</option><option>TV FUEGO</option><option>OOPS</option><option>MOVISTAR</option></select>
            </div>

            <button onclick="guardarEncuesta()" class="btn-send">ENVIAR ENCUESTA</button>
        </div>
    </div>

    <div id="view-admin" class="card">
        <h2 style="text-align:center">BI Visión - Dashboard</h2>
        <div class="stats-grid">
            <div class="stat-card"> <h2 id="st-total">0</h2> <span>MUESTRAS</span> </div>
            <div class="stat-card" style="background:var(--accent)"> <h2 id="st-nps">0</h2> <span>NPS</span> </div>
            <div class="stat-card" style="background:var(--danger)"> <h2 id="st-risk">0</h2> <span>RIESGOS</span> </div>
        </div>
        <input type="text" id="search" placeholder="Filtrar por asesor..." onkeyup="dibujarTabla()">
        <div style="overflow-x:auto">
            <table>
                <thead><tr><th>Fecha</th><th>Cliente</th><th>Asesor</th><th>Calif.</th><th>NPS</th><th>Comp.</th><th>Comentario</th></tr></thead>
                <tbody id="tabla-body"></tbody>
            </table>
        </div>
        <button onclick="location.reload()" style="margin-top:10px; background:#666; color:white">Volver</button>
    </div>

</div>

<script>
    const FIREBASE = "https://vision-bi-6bd64-default-rtdb.firebaseio.com/";
    const URL_WEB = window.location.href; // Toma la URL actual de GitHub
    let rawData = [];

    // --- LÓGICA EMISOR ---
   async function procesarYEnviar() {
    const nro = document.getElementById('em-nro').value;
    const dni = document.getElementById('em-dni').value;
    const tel = document.getElementById('em-phone').value;
    const ase = document.getElementById('em-asesor').value;

    if(!nro || !dni || !tel) return alert("Completá todos los campos.");

    const token = { nro: nro, dni: dni, asesor: ase, usado: false, fecha: new Date().toISOString() };
    await fetch(`${FIREBASE}tokens/${dni}.json`, { method: 'PUT', body: JSON.stringify(token) });

    // AGREGAMOS EL PARÁMETRO MODO CLIENTE AL LINK
    const linkEncuesta = URL_WEB.includes('?') ? `${URL_WEB}&modo=cliente` : `${URL_WEB}?modo=cliente`;

    const msj = `Hola! Gracias por elegir Ushuaia Visión. Valoramos mucho tu opinión. Completá la encuesta aquí: ${linkEncuesta} (Validá con tu DNI: ${dni})`;
    const linkWs = `https://wa.me/54${tel}?text=${encodeURIComponent(msj)}`;

    window.open(linkWs, '_blank');
    alert("✅ Cliente habilitado y link enviado.");
}

        // 1. Guardar Token en Firebase
        const token = { nro: nro, dni: dni, asesor: ase, usado: false, fecha: new Date().toISOString() };
        await fetch(`${FIREBASE}tokens/${dni}.json`, { method: 'PUT', body: JSON.stringify(token) });

        // 2. Generar mensaje de WhatsApp
        const msj = `Hola! Gracias por elegir Ushuaia Visión. Valoramos mucho tu opinión sobre nuestra atención hoy. Podés completar la encuesta aquí: ${URL_WEB} (Validá con tu DNI: ${dni})`;
        const linkWs = `https://wa.me/54${tel}?text=${encodeURIComponent(msj)}`;

        // 3. Abrir WhatsApp y resetear
        window.open(linkWs, '_blank');
        alert("✅ Cliente habilitado y chat de WhatsApp abierto.");
        location.reload();
    }

    // --- LÓGICA ENCUESTA ---
    async function validarDNI() {
        const dni = document.getElementById('auth-dni').value;
        const res = await fetch(`${FIREBASE}tokens/${dni}.json`);
        const data = await res.json();

        if(data && !data.usado) {
            window.activeToken = data;
            document.getElementById('survey-auth').style.display = 'none';
            document.getElementById('survey-main').style.display = 'block';
        } else {
            alert("DNI no habilitado o encuesta ya enviada.");
        }
    }

    function detectarBaja() {
        const txt = document.getElementById('q-comentario').value.toLowerCase();
        const alert = ["baja", "cancelar", "irme", "fuego", "starlink", "caro", "precio"];
        document.getElementById('div-baja').style.display = alert.some(word => txt.includes(word)) ? 'block' : 'none';
    }

    async function guardarEncuesta() {
        const enc = {
            ...window.activeToken,
            calif: document.getElementById('q-atencion').value,
            nps: document.getElementById('q-nps').value,
            comentario: document.getElementById('q-comentario').value,
            competencia: document.getElementById('q-comp').value,
            finalizado: new Date().toLocaleString()
        };

        await fetch(`${FIREBASE}encuestas.json`, { method: 'POST', body: JSON.stringify(enc) });
        await fetch(`${FIREBASE}tokens/${window.activeToken.dni}.json`, { method: 'PATCH', body: JSON.stringify({usado:true}) });
        alert("¡Muchas gracias por tu tiempo!");
        location.reload();
    }

    // --- LÓGICA ADMIN ---
    async function accesoAdmin() {
        if(prompt("Clave:") === "Vision2026") {
            document.getElementById('view-emitter').style.display = 'none';
            document.getElementById('view-admin').style.display = 'block';
            const res = await fetch(`${FIREBASE}encuestas.json`);
            const json = await res.json();
            rawData = json ? Object.values(json) : [];
            dibujarTabla();
        }
    }

    function dibujarTabla() {
        const body = document.getElementById('tabla-body');
        const filter = document.getElementById('search').value.toLowerCase();
        body.innerHTML = "";
        let npsTotal = 0, riesgos = 0;

        rawData.reverse().forEach(e => {
            if(e.asesor.toLowerCase().includes(filter)) {
                npsTotal += parseInt(e.nps);
                const isRisk = (e.nps <= 6 || e.competencia !== "Ninguna");
                if(isRisk) riesgos++;
                
                body.innerHTML += `<tr class="${isRisk ? 'row-risk' : ''}">
                    <td>${e.finalizado.split(',')[0]}</td><td>${e.nro}</td><td>${e.asesor}</td>
                    <td>${e.calif}⭐</td><td>${e.nps}</td><td>${e.competencia}</td><td>${e.comentario}</td>
                </tr>`;
            }
        });

        document.getElementById('st-total').innerText = rawData.length;
        document.getElementById('st-nps').innerText = rawData.length ? (npsTotal/rawData.length).toFixed(1) : 0;
        document.getElementById('st-risk').innerText = riesgos;
    }
    // DETECTOR DE MODO AL CARGAR LA PÁGINA
window.onload = function() {
    const urlParams = new URLSearchParams(window.location.search);
    const modo = urlParams.get('modo');

    if (modo === 'cliente') {
        // Ocultamos todo y mostramos solo la encuesta
        document.getElementById('view-emitter').style.display = 'none';
        document.getElementById('view-admin').style.display = 'none';
        document.getElementById('view-survey').style.display = 'block';
    } else {
        // Modo Asesor por defecto
        showView('view-emitter');
    }
};
</script>
</body>
</html>
